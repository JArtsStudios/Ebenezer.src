<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reproductor de Video</title>

  <link rel="stylesheet" href="../../css/reproductor.css">
  <link rel="icon" href="../../img/logo pequeño.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

  <script src="../../js/reproductor.js" defer></script>
</head>

<body>
  <div class="bg"></div>

  <!-- Topbar -->
  <header class="topbar" id="top">
    <a class="back" href="#" onclick="window.history.back(); return false;">
      <i class="fa-solid fa-arrow-left"></i>
      <span>Salir</span>
    </a>


    <div></div>
  </header>

  <!-- Layout -->
  <main class="wrap">

    <!-- VIDEO -->
    <section class="panel video-panel">
      <div class="player-shell">
        <div id="player"></div>
      </div>

      <div class="meta">
        <h1 id="videoTitle" class="video-title"></h1>

        <div class="meta-actions">
          <button id="toggleDescription" class="btn">
            <i class="fa-solid fa-align-left"></i> Ver descripción
          </button>

          <div class="stats-row">
            <span id="videoLikes" class="pill">Likes: —</span>
            <span id="videoComments" class="pill">Comentarios: —</span>
          </div>
        </div>

        <div class="desc-box" id="descBox">
          <p id="videoDescription" class="video-description"></p>
        </div>
      </div>
    </section>



  </main>
</body>
</html>
