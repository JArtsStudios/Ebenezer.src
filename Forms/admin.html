<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
<link rel="stylesheet" href="admin.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<script>
const pass = prompt("Contraseña");
if(pass !== "ebenezer2026"){ alert("Acceso denegado"); location.reload(); }
</script>

<div class="app">

<header>
  <h1>Panel de Miembros</h1>
  <div class="stats">
    <div class="card">
      <span>Total Miembros</span>
      <h2 id="totalMiembros">0</h2>
    </div>
  </div>
</header>

<div class="toolbar">
  <select id="filtroSector">
    <option value="Todos">Todos</option>
    <option>1</option><option>2</option><option>3</option><option>4</option>
  </select>

  <!-- 🔥 BUSCADOR -->
  <input id="buscador" placeholder="Buscar nombre, discipulado o ministerio...">

  <button onclick="exportar()">Exportar</button>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Nombre</th>
<th>ID</th>
<th>Teléfono</th>
<th>Sector</th>
<th>Discipulado</th>
<th>Rol</th>
<th>Casa</th>
<th>Sirviendo</th>
<th>Ministerios</th>
<th>Quiere Servir</th>
<th>Ministerio Deseado</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<div class="charts">
  <div class="chart-box">
    <canvas id="grafica"></canvas>
  </div>
  <div class="chart-box">
    <canvas id="graficaPastel"></canvas>
  </div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  authDomain: "miembros-ebenezer-src.firebaseapp.com",
  projectId: "miembros-ebenezer-src"
});
const db = getFirestore(app);

let miembros = [];
let chartBar, chartPie;

async function cargar() {
  const snap = await getDocs(collection(db, "miembros"));
  miembros = [];
  snap.forEach(d => miembros.push(d.data()));

  totalMiembros.textContent = miembros.length;

  render();
  graf();
}

function formatearMinisterios(mins){
  if(!mins || mins.length===0) return "—";
  return mins.map(m=>`${m.nombre} (${m.cargo})`).join(", ");
}

function coincideBusqueda(m, texto){
  texto = texto.toLowerCase();

  const nombre = m.nombre?.toLowerCase() || "";
  const discipulado = m.discipulado?.toLowerCase() || "";

  const ministerios = (m.ministerios || [])
    .map(x => x.nombre.toLowerCase())
    .join(" ");

  return nombre.includes(texto) ||
         discipulado.includes(texto) ||
         ministerios.includes(texto);
}

function render(){
  tabla.innerHTML = "";
  const f = filtroSector.value;
  const texto = buscador.value.trim().toLowerCase();

  miembros.forEach(m=>{
    if((f === "Todos" || m.sector === f) &&
       (!texto || coincideBusqueda(m, texto))){

      const numMin = m.ministerios?.length || 0;

      const quiereServir = numMin === 0 ? (m.quiereMinisterio || "—") : "—";
      const ministerioDeseado = numMin === 0 ? (m.ministerioDeseado || "—") : "—";

      tabla.innerHTML += `<tr>
<td>${m.nombre}</td>
<td>${m.identidad}</td>
<td>${m.telefono || "—"}</td>
<td>${m.sector}</td>
<td>${m.discipulado || "—"}</td>
<td>${m.rolDiscipulado || "—"}</td>
<td>${m.casaDiscipulado || "—"}</td>
<td>${m.sirviendo}</td>
<td>${formatearMinisterios(m.ministerios)}</td>
<td>${quiereServir}</td>
<td>${ministerioDeseado}</td>
</tr>`;
    }
  });
}

filtroSector.onchange = render;
buscador.oninput = render; // 🔥 BUSCA EN TIEMPO REAL

function graf(){

  if(chartBar) chartBar.destroy();
  if(chartPie) chartPie.destroy();

  const sectores = {"1":0,"2":0,"3":0,"4":0};

  let sirviendo = 0;
  let noSirviendo = 0;
  let quierenServir = 0;

  miembros.forEach(m=>{
    sectores[m.sector]++;

    const numMin = m.ministerios?.length || 0;

    if(numMin > 0){
      sirviendo++;
    } else if(m.quiereMinisterio){
      quierenServir++;
    } else {
      noSirviendo++;
    }
  });

  chartBar = new Chart(grafica, {
    type: "bar",
    data: {
      labels: ["1","2","3","4"],
      datasets: [{
        label: "Miembros por Sector",
        data: [sectores["1"], sectores["2"], sectores["3"], sectores["4"]],
        backgroundColor: ["#00aaff","#ffaa00","#ff00aa","#00ffaa"]
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{legend:{display:false}}
    }
  });

  chartPie = new Chart(graficaPastel, {
    type: "pie",
    data: {
      labels: ["Sirviendo", "No Sirviendo", "Quieren Servir"],
      datasets: [{
        data: [sirviendo, noSirviendo, quierenServir],
        backgroundColor: ["#00ffaa","#ff4444","#ffaa00"]
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false
    }
  });
}

window.exportar = function(){
  let csv = "Nombre,ID,Telefono,Sector,Discipulado,Rol,Casa,Sirviendo,Ministerios,Quiere Servir,Ministerio Deseado\n";

  miembros.forEach(m=>{
    const mins = m.ministerios?.map(x=>`${x.nombre} (${x.cargo})`).join(" | ") || "";
    const numMin = m.ministerios?.length || 0;

    const quiere = numMin === 0 ? (m.quiereMinisterio || "") : "";
    const deseado = numMin === 0 ? (m.ministerioDeseado || "") : "";

    csv += `${m.nombre},${m.identidad},${m.telefono || ""},${m.sector},${m.discipulado || ""},${m.rolDiscipulado || ""},${m.casaDiscipulado || ""},${m.sirviendo},${mins},${quiere},${deseado}\n`;
  });

  const blob = new Blob([csv]);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "miembros.csv";
  a.click();
};

cargar();

</script>
</body>
</html>
