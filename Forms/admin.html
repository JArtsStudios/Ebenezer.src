<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
<link rel="stylesheet" href="admin.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<script>
const pass=prompt("Contraseña");
if(pass!=="ebenezer2026"){alert("Acceso denegado");location.reload();}
</script>

<div class="app">

<header>Panel miembros</header>

<div class="toolbar">
<select id="filtroSector">
<option value="Todos">Todos</option>
<option>1</option><option>2</option><option>3</option><option>4</option>
</select>
<button onclick="exportar()">Exportar</button>
</div>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>ID</th>
<th>Sector</th>
<th>Discipulado</th>
<th>Sirviendo</th>
<th>Ministerios</th>
<th>Supervisor</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<canvas id="grafica"></canvas>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app=initializeApp({
apiKey:"AIzaSyBtPxzxzXYWKRDOo_EMtp5iCfLYzLe5CFU",
authDomain:"miembros-ebenezer-src.firebaseapp.com",
projectId:"miembros-ebenezer-src"
});
const db=getFirestore(app);

let miembros=[];

async function cargar(){
const snap=await getDocs(collection(db,"miembros"));
miembros=[];
snap.forEach(d=>miembros.push(d.data()));
render();
graf();
}

function formatearMinisterios(mins){
if(!mins || mins.length===0) return "—";
return mins.map(m=>`${m.nombre} (${m.cargo})`).join("<br>");
}

function render(){
tabla.innerHTML="";
const f=filtroSector.value;

miembros.forEach(m=>{
if(f==="Todos"||m.sector===f){

const numMin = m.ministerios?.length || 0;

const supervisorTexto = m.supervisor==="Si"
? `Sí (Sector ${m.sectorSupervisor||"?"})`
: "No";

tabla.innerHTML+=`<tr>
<td>${m.nombre}</td>
<td>${m.identidad}</td>
<td>${m.sector}</td>
<td>${m.discipulado||"—"}</td>
<td>${m.sirviendo}</td>
<td>
<b>${numMin}</b><br>
${formatearMinisterios(m.ministerios)}
</td>
<td>${supervisorTexto}</td>
</tr>`;
}
});
}

filtroSector.onchange=render;

function graf(){
const c={"1":0,"2":0,"3":0,"4":0};
miembros.forEach(m=>c[m.sector]++);
new Chart(grafica,{
type:"bar",
data:{
labels:["1","2","3","4"],
datasets:[{data:[c["1"],c["2"],c["3"],c["4"]]}]
}
});
}

window.exportar=function(){

let csv="Nombre,ID,Sector,Discipulado,Sirviendo,Ministerios,Supervisor\n";

miembros.forEach(m=>{

const mins = m.ministerios?.map(x=>`${x.nombre} (${x.cargo})`).join(" | ") || "";
const sup = m.supervisor==="Si" ? `Si sector ${m.sectorSupervisor}` : "No";

csv+=`${m.nombre},${m.identidad},${m.sector},${m.discipulado},${m.sirviendo},${mins},${sup}\n`;

});

const blob=new Blob([csv]);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="miembros.csv";
a.click();
};

cargar();

</script>
</body>
</html>
