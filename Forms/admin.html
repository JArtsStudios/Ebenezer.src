<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
<link rel="stylesheet" href="admin.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<script>
const pass = prompt("Contraseña");
if(pass !== "ebenezer2026"){ alert("Acceso denegado"); location.reload(); }
</script>

<div class="app">

<header>Panel miembros</header>

<div class="toolbar">
<select id="filtroSector">
<option value="Todos">Todos</option>
<option>1</option><option>2</option><option>3</option><option>4</option>
</select>
<button onclick="exportar()">Exportar</button>
</div>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>ID</th>
<th>Teléfono</th>
<th>Sector</th>
<th>Discipulado</th>
<th>Rol Disc.</th>
<th>Casa</th>
<th>Sirviendo</th>
<th>Ministerios</th>
<th>Quiere Servir</th>
<th>Ministerio Deseado</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<canvas id="grafica"></canvas>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyBtPxzxzXYWKRDOo_EMtp5iCfLYzLe5CFU",
  authDomain: "miembros-ebenezer-src.firebaseapp.com",
  projectId: "miembros-ebenezer-src"
});
const db = getFirestore(app);

let miembros = [];

async function cargar() {
  const snap = await getDocs(collection(db, "miembros"));
  miembros = [];
  snap.forEach(d => miembros.push(d.data()));
  render();
  graf();
}

// formatear ministerios
function formatearMinisterios(mins){
  if(!mins || mins.length===0) return "—";
  return mins.map(m=>`${m.nombre} (${m.cargo})`).join("<br>");
}

function render(){
  tabla.innerHTML = "";
  const f = filtroSector.value;

  miembros.forEach(m=>{
    if(f === "Todos" || m.sector === f){

      const numMin = m.ministerios?.length || 0;

      // solo mostrar si NO sirve en ministerios
      const quiereServir = numMin === 0 ? (m.quiereMinisterio || "—") : "—";
      const ministerioDeseado = numMin === 0 ? (m.ministerioDeseado || "—") : "—";

      tabla.innerHTML += `<tr>
<td>${m.nombre}</td>
<td>${m.identidad}</td>
<td>${m.telefono || "—"}</td>
<td>${m.sector}</td>
<td>${m.discipulado||"—"}</td>
<td>${m.rolDiscipulado||"—"}</td>
<td>${m.casaDiscipulado || "—"}</td>
<td>${m.sirviendo}</td>
<td>
<b>${numMin}</b><br>
${formatearMinisterios(m.ministerios)}
</td>
<td>${quiereServir}</td>
<td>${ministerioDeseado}</td>
</tr>`;
    }
  });
}

filtroSector.onchange = render;

function graf(){
  const c = {"1":0,"2":0,"3":0,"4":0};
  miembros.forEach(m=>c[m.sector]++);
  new Chart(grafica, {
    type: "bar",
    data: {
      labels: ["1","2","3","4"],
      datasets: [{
        label: "Miembros por Sector",
        data: [c["1"], c["2"], c["3"], c["4"]],
        backgroundColor: ["#00aaff","#ffaa00","#ff00aa","#00ffaa"]
      }]
    },
    options:{
      responsive:true,
      plugins:{legend:{display:false}}
    }
  });
}

window.exportar = function(){
  let csv = "Nombre,ID,Telefono,Sector,Discipulado,Rol Discipulado,Casa,Sirviendo,Ministerios,Quiere Servir,Ministerio Deseado\n";
  miembros.forEach(m=>{
    const mins = m.ministerios?.map(x=>`${x.nombre} (${x.cargo})`).join(" | ") || "";
    const numMin = m.ministerios?.length || 0;

    const quiere = numMin === 0 ? (m.quiereMinisterio || "") : "";
    const deseado = numMin === 0 ? (m.ministerioDeseado || "") : "";

    csv += `${m.nombre},${m.identidad},${m.telefono||""},${m.sector},${m.discipulado||""},${m.rolDiscipulado||""},${m.casaDiscipulado||""},${m.sirviendo},${mins},${quiere},${deseado}\n`;
  });
  const blob = new Blob([csv]);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "miembros.csv";
  a.click();
};

cargar();

</script>
</body>
</html>
