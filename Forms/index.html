<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Miembros</title>
<link rel="stylesheet" href="formulario.css">
</head>
<body>

<div class="app">

<header>Registro de miembros</header>

<form id="form">

<div class="group">
<label>Nombre completo</label>
<input id="nombre" required>
</div>

<div class="group">
<label>Identidad</label>
<input id="identidad" maxlength="15" required>
</div>

<div class="group">
<label>Teléfono</label>
<input id="telefono" required>
</div>

<div class="group">
<label>Sector</label>
<select id="sector" required>
<option value="">Seleccionar</option>
<option>1</option><option>2</option><option>3</option><option>4</option>
</select>
</div>

<div class="group">
<label>Discipulado</label>
<input id="discipulado" required>
</div>

<div class="group">
<label>Rol en discipulado</label>
<select id="rolDiscipulado" required>
<option value="">Seleccionar</option>
<option>Miembro</option>
<option>Sub líder</option>
<option>Líder</option>
<option>Ayuda</option>
</select>
</div>

<div class="group">
<label>¿Presta su casa para discipulado?</label>
<select id="casaDiscipulado" required>
<option value="">Seleccionar</option>
<option>Sí</option>
<option>No</option>
</select>
</div>

<section>

<label class="section-title">¿Está sirviendo?</label>

<div class="toggle">
<label class="pill"><input type="radio" name="sirviendo" value="Si" required><span>Sí</span></label>
<label class="pill"><input type="radio" name="sirviendo" value="No"><span>No</span></label>
</div>

<div id="ministerioSection" class="hidden">

<div class="group">
<label>Cantidad ministerios</label>
<select id="cantidadMinisterios">
<option value="">Seleccionar</option>
<option value="0">0 (sirve sin ministerio)</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
</select>
</div>

<div id="ministeriosContainer"></div>

</div>

<div id="noMinisterioSection" class="hidden">

<div class="group">
<label>¿Te gustaría servir en un ministerio?</label>
<select id="quiereMinisterio">
<option value="">Seleccionar</option>
<option>Sí</option>
<option>No</option>
</select>
</div>

<div id="ministerioDeseadoGroup" class="group hidden">
<label>¿En qué ministerio?</label>
<select id="ministerioDeseado">
<option value="">Seleccionar</option>
<option>Alabanza</option>
<option>Danza</option>
<option>Corros</option>
<option>Niños</option>
<option>Matrimonios</option>
<option>Jóvenes</option>
<option>Evangelismo</option>
<option>Multimedia</option>
<option>Sonido</option>
<option>Intercesión</option>
<option>Conica</option>
  
</select>
</div>

</div>

</section>

<button>Guardar</button>

</form>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyBtPxzxzXYWKRDOo_EMtp5iCfLYzLe5CFU",
  authDomain: "miembros-ebenezer-src.firebaseapp.com",
  projectId: "miembros-ebenezer-src"
});
const db = getFirestore(app);

// FORMATO IDENTIDAD
identidad.addEventListener("input", e => {
  let value = e.target.value.replace(/\D/g, "");

  if (value.length > 4) value = value.slice(0,4) + "-" + value.slice(4);
  if (value.length > 9) value = value.slice(0,9) + "-" + value.slice(9);

  e.target.value = value.slice(0,15);
});

// mostrar secciones
document.querySelectorAll('[name="sirviendo"]').forEach(r=>{
  r.onchange = ()=>{
    const sirve = r.value === "Si";
    ministerioSection.classList.toggle("hidden", !sirve);

    if(!sirve){
      noMinisterioSection.classList.remove("hidden");
    } else {
      noMinisterioSection.classList.add("hidden");
    }

    cantidadMinisterios.required = sirve;

    if(!sirve){
      cantidadMinisterios.value = "";
      ministeriosContainer.innerHTML = "";
    }
  };
});

// mostrar campo ministerio deseado
quiereMinisterio.onchange = ()=>{
  ministerioDeseadoGroup.classList.toggle("hidden", quiereMinisterio.value !== "Sí");
};

// lista ministerios
const ministeriosLista = [
  "Alabanza",
  "Danza",
  "Corros",
  "Niños",
  "Matrimonios",
  "Jóvenes",
  "Evangelismo",
  "Multimedia",
  "Sonido",
  "Intercesión",
  "cocina",
];

cantidadMinisterios.onchange = e=>{
  ministeriosContainer.innerHTML = "";
  const cantidad = parseInt(e.target.value);

  
  if(cantidad === 0){
    noMinisterioSection.classList.remove("hidden");
    return;
  } else {
    noMinisterioSection.classList.add("hidden");
  }

  if(!cantidad) return;

  for(let i=1; i<=cantidad; i++){
    ministeriosContainer.innerHTML += `
    <div class="group">
      <label>Ministerio ${i}</label>
      <select class="minNombre" required>
        <option value="">Seleccionar</option>
        ${ministeriosLista.map(m => `<option>${m}</option>`).join("")}
      </select>
    </div>
    <div class="group">
      <label>Cargo</label>
      <select class="minCargo" required>
        <option value="">Seleccionar</option>
        <option>Miembro</option>
        <option>Líder</option>
      </select>
    </div>`;
  }
};

// submit
form.onsubmit = async e=>{
  e.preventDefault();

  const ministerios = [];
  document.querySelectorAll(".minNombre").forEach((m,i)=>{
    ministerios.push({
      nombre: m.value,
      cargo: document.querySelectorAll(".minCargo")[i].value
    });
  });

  await addDoc(collection(db,"miembros"),{
    nombre: nombre.value,
    identidad: identidad.value,
    telefono: telefono.value,
    sector: sector.value,
    discipulado: discipulado.value,
    rolDiscipulado: rolDiscipulado.value,
    casaDiscipulado: casaDiscipulado.value,
    sirviendo: document.querySelector('[name="sirviendo"]:checked').value,
    ministerios,
    quiereMinisterio: quiereMinisterio?.value || null,
    ministerioDeseado: ministerioDeseado?.value || null
  });

  alert("Guardado");
  form.reset();
  ministeriosContainer.innerHTML = "";
  ministerioDeseadoGroup.classList.add("hidden");
};

</script>
</body>
</html>
